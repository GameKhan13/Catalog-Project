<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pulseify</title>
  <link rel="stylesheet" href="/styles.css" />
</head>
<body>
<div id="toast" class="toast hidden"></div>

<section id="authScreen" class="screen auth-screen">
  <div class="auth-card">
    <div class="brand-block">
      <div class="brand-logo">♪</div>
      <div>
        <h1>Pulseify</h1>
      </div>
    </div>

    <div class="tabs">
      <button id="loginTab" class="tab active" type="button">Login</button>
      <button id="signupTab" class="tab" type="button">Sign Up</button>
    </div>

    <form id="loginForm" class="auth-form">
      <label>
        Username
        <input id="loginUsername" type="text" autocomplete="username" required />
      </label>
      <label>
        Password
        <input id="loginPassword" type="password" autocomplete="current-password" required />
      </label>
      <button type="submit" class="primary-btn">Login</button>
    </form>

    <form id="signupForm" class="auth-form hidden">
      <label>
        Username
        <input id="signupUsername" type="text" minlength="3" maxlength="20" required />
      </label>
      <label>
        Password
        <input id="signupPassword" type="password" minlength="6" required />
      </label>
      <button type="submit" class="primary-btn">Create account</button>
    </form>
  </div>
</section>

<section id="appScreen" class="screen app-screen hidden">
  <aside class="sidebar">
    <div class="sidebar-collapse-button">
      <button id="collapseSideButton" class="primary-btn"><<</button>
    </div>
    <div class="sidebar-content open">
      <div class="sidebar-brand">
        <div class="brand-logo small">♪</div>
        <div>
          <h2>Pulseify</h2>
        </div>
      </div>

      <div class="user-card">
        <div>
          <strong id="currentUsername"></strong>
          <p id="currentRole"></p>
        </div>
        <button id="logoutBtn" class="ghost-btn">Logout</button>
      </div>

      <section class="panel">
        <div class="panel-title-row">
          <h3>Playlists</h3>
        </div>
        <form id="playlistForm" class="stack-form">
          <input id="playlistName" type="text" placeholder="New playlist name" required />
          <label id="globalPlaylistRow" class="checkbox-row hidden">
            <input id="playlistIsGlobal" type="checkbox" />
            <span>Create as a global admin playlist</span>
          </label>
          <button type="submit" class="primary-btn compact">Create</button>
        </form>
        <div id="playlistList" class="playlist-list"></div>
      </section>

      <section id="adminPanel" class="panel hidden">
        <div class="panel-title-row">
          <h3>Admin Controls</h3>
        </div>
        <form id="songForm" class="stack-form">
          <input id="songId" type="hidden" />
          <input id="songTitle" type="text" placeholder="Song title" required />
          <input id="songArtist" type="text" placeholder="Artist" required />
          <input id="songAlbum" type="text" placeholder="Album" />
          <input id="songYear" type="number" placeholder="Year" min="0" max="9999" required />
          <input id="songGenre" type="text" placeholder="Genre" />
          <input id="songImageFile" type="text" placeholder="Image filename, e.g. weeknd.svg" />
          <textarea id="songLyrics" rows="4" placeholder="Lyrics used by the main search"></textarea>
          <div class="button-row">
            <button type="submit" class="primary-btn compact">Save Song</button>
            <button id="clearSongBtn" type="button" class="ghost-btn compact">Clear</button>
          </div>
        </form>
      </section>
    </div>
  </aside>

  <main class="content">
    <header class="hero">
      <div>
        <p class="eyebrow">Catalog browser</p>
        <h1>Browse music</h1>
      </div>
    </header>

    <section class="filters panel wide">
      <div class="search-bar">
        <input id="searchInput" type="text" placeholder="Search title, artist, album, genre, year" />
        <button id="filtersButton" class="ghost-btn">Filters</button>
      </div>
      <div class="filter-grid">
        <input id="artistFilter" type="text" placeholder="Filter by artist" />
        <input id="titleFilter" type="text" placeholder="Filter by title" />
        <input id="genreFilter" type="text" placeholder="Filter by genre" />
        <input id="albumFilter" type="text" placeholder="Filter by album" />
        <input id="yearFilter" type="number" placeholder="Filter by year" />
      </div>
    </section>

    <section class="catalog-section">
      <div class="section-title-row">
        <h2>Catalog</h2>
        <span id="songCount"></span>
      </div>
      <div id="songGrid" class="song-grid"></div>
    </section>
  </main>
</section>

<script src="/app.js"></script>
</body>
</html>
